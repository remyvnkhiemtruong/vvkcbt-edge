upstream api_ha {
    server api-master:3000 max_fails=2 fail_timeout=5s;
    server api-replica:3000 backup;
}

server {
    listen 80;
    client_max_body_size 100M;

    location /api/infra/health {
        proxy_pass http://api_ha;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }

    location /api/ {
        proxy_pass http://api_ha;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout http_502 http_503;
    }

    location /socket.io/ {
        proxy_pass http://api_ha;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /student/ {
        alias /usr/share/nginx/html/student/;
        try_files $uri $uri/ /student/index.html;
    }

    location /proctor/ {
        alias /usr/share/nginx/html/proctor/;
        try_files $uri $uri/ /proctor/index.html;
    }

    location /waiting-room {
        alias /usr/share/nginx/html/scripts/waiting-room-diagnostic.html;
    }

    location / {
        return 302 /student/;
    }
}
