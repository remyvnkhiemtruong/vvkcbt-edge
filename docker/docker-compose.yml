services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vnu
      POSTGRES_PASSWORD: vnu_secret
      POSTGRES_DB: vnu_exam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnu -d vnu_exam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://vnu:vnu_secret@postgres:5432/vnu_exam
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      ANONYMIZATION_SALT: dev-anonymization-salt
      AUDIO_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      UPLOAD_DIR: /app/uploads
      BACKUP_DIR: /app/backups
      COMPOSER_USER: composer
      COMPOSER_PASSWORD: composer123
      EDGE_ORIGINS: http://localhost,http://127.0.0.1
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
      - ../apps/web/student/dist:/usr/share/nginx/html/student
      - ../apps/web/proctor/dist:/usr/share/nginx/html/proctor
      - ../scripts/waiting-room-diagnostic.html:/usr/share/nginx/html/scripts/waiting-room-diagnostic.html:ro
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
  backups:
