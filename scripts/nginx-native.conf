upstream api_backend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /proctoring {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /student/ {
        alias __VNU_ROOT__/apps/web/student/dist/;
        try_files $uri $uri/ /student/index.html;
    }

    location /proctor/ {
        alias __VNU_ROOT__/apps/web/proctor/dist/;
        try_files $uri $uri/ /proctor/index.html;
    }

    location /waiting-room {
        alias __VNU_ROOT__/scripts/waiting-room-diagnostic.html;
    }

    location / {
        return 302 /student/;
    }
}
