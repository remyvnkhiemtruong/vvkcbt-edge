<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>CBT 2025 — Chẩn đoán phần cứng & mạng</title>
  <style>
    :root {
      --navy: #0f172a;
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --bg: #f0f2f5;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
    .feature { text-align: center; padding: 1.5rem 1rem 0; }
    .feature h1 { color: var(--primary); font-size: 1.2rem; margin: 0; }
    .feature p { color: #64748b; font-size: 0.9rem; }
    .window { max-width: 640px; margin: 1rem auto 2rem; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.08); border: 1px solid #e2e8f0; background: #fff; }
    .header { background: var(--navy); color: #fff; padding: 0.85rem 1.25rem; display: flex; justify-content: space-between; font-size: 0.85rem; }
    .body { padding: 2rem 1.5rem; background: var(--bg); }
    .modal { background: #fff; border: 2px solid var(--danger); border-radius: 8px; padding: 1.25rem; }
    .modal h2 { text-align: center; font-size: 1rem; margin: 0 0 0.75rem; }
    .modal hr { border: none; border-top: 1px solid #e2e8f0; margin: 0 0 1rem; }
    .item { padding: 0.5rem 0; font-size: 0.95rem; }
    .item.ok { color: var(--success); }
    .item.fail { background: #fee2e2; color: var(--danger); padding: 0.5rem 0.75rem; border-radius: 4px; margin: 0.35rem 0; }
    .btn-danger { width: 100%; margin-top: 1rem; padding: 0.85rem; background: var(--danger); color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; display: none; }
    .footer { display: flex; justify-content: space-between; padding: 0.65rem 1.25rem; font-size: 0.75rem; color: #64748b; border-top: 1px solid #e2e8f0; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
    .btn { padding: 0.65rem 1.25rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-primary { background: var(--primary); color: #fff; }
  </style>
</head>
<body>
  <div class="feature">
    <h1>TÍNH NĂNG 19. TRÌNH CHẨN ĐOÁN PHẦN CỨNG & MẠNG</h1>
    <p>Mô phỏng Giao diện Hệ thống Khảo thí CBT 2025</p>
  </div>
  <div class="window">
    <div class="header">
      <span>TRÌNH CHẨN ĐOÁN PHẦN CỨNG & MẠNG</span>
      <span>Chạy ngầm tại Phòng chờ</span>
    </div>
    <div class="body">
      <div class="modal">
        <h2>KẾT QUẢ QUÉT HỆ THỐNG TRẠM</h2>
        <hr>
        <div id="results"></div>
        <button id="changeBtn" class="btn-danger" type="button">YÊU CẦU GIÁM THỊ ĐỔI MÁY</button>
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="runAll()">Chạy lại kiểm tra</button>
        <button class="btn btn-primary" type="button" onclick="location.href='http://127.0.0.1:5173/student/'">Vào thi</button>
      </div>
    </div>
    <div class="footer">
      <span>THPT Võ Văn Kiệt - Cà Mau | Tài liệu Đặc tả Giao diện CBT</span>
      <span>Trang 19/24</span>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:3000';

    function addResult(text, pass, fail) {
      const div = document.createElement('div');
      div.className = 'item ' + (pass ? 'ok' : 'fail');
      div.innerHTML = '[' + (pass ? '✓' : '✗') + '] <strong>' + text + '</strong>';
      document.getElementById('results').appendChild(div);
      if (fail) document.getElementById('changeBtn').style.display = 'block';
    }

    async function runAll() {
      document.getElementById('results').innerHTML = '';
      document.getElementById('changeBtn').style.display = 'none';
      let hasFail = false;

      try {
        localStorage.setItem('vnu_test', 'ok');
        const v = localStorage.getItem('vnu_test');
        localStorage.removeItem('vnu_test');
        addResult('Quyền ghi LocalStorage: OK (Sẵn sàng Auto-save)', v === 'ok', false);
      } catch (e) {
        addResult('LocalStorage: ' + e.message, false, true);
        hasFail = true;
      }

      const start = performance.now();
      try {
        const res = await fetch(API + '/api/infra/health');
        const ms = Math.round(performance.now() - start);
        addResult('Mạng LAN (Ping): ' + ms + 'ms (Kết nối rất ổn định)', res.ok, false);
      } catch (e) {
        addResult('Mạng LAN: Không kết nối được', false, true);
        hasFail = true;
      }

      const w = screen.width, h = screen.height;
      if (w < 1024) {
        addResult('Lỗi Độ phân giải màn hình: ' + w + 'x' + h + '. Quá thấp, không đủ điều kiện hiển thị giao diện Split-View.', false, true);
        hasFail = true;
      } else {
        addResult('Độ phân giải màn hình: ' + w + 'x' + h + ' — OK', true, false);
      }
    }

    runAll();
  </script>
</body>
</html>
