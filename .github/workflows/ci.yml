name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout vnu-composer (kit sync)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vnu-composer
          path: vnu-composer
          ref: ${{ github.ref_name }}
        continue-on-error: true

      - uses: ankane/setup-postgres@v1
        with:
          postgres-version: 16
          database: vnu_exam
          user: vnu
          password: vnu_secret

      - uses: shogo82148/actions-setup-redis@v1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run test -w @vnu/shared-types
      - run: npm run test -w @vnu/exam-package-kit
      - run: npm run test -w @vnu/web-shared
      - run: npm run build
        env:
          DATABASE_URL: postgresql://vnu:vnu_secret@localhost:5432/vnu_exam
          JWT_SECRET: ci-jwt-secret-min-32-characters-long
          ANONYMIZATION_SALT: ci-salt
          AUDIO_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef

      - name: Run API migrations
        run: npm run migration:run -w @vnu/api
        env:
          DATABASE_URL: postgresql://vnu:vnu_secret@localhost:5432/vnu_exam
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: API unit tests (ZIP + blueprint roundtrip)
        run: npm test -w @vnu/api -- --testPathPattern="zip-roundtrip|blueprint-roundtrip"
        env:
          DATABASE_URL: postgresql://vnu:vnu_secret@localhost:5432/vnu_exam
          JWT_SECRET: ci-jwt-secret-min-32-characters-long

      - name: Kit sync check
        run: npm run kit-sync-check
        env:
          COMPOSER_ROOT: ${{ github.workspace }}/vnu-composer

  composer-kit-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build exam-package-kit (shared with vnu-composer)
        run: |
          npm ci
          npm run build -w @vnu/shared-types
          npm run build -w @vnu/exam-package-kit
          npm run test -w @vnu/shared-types
          npm test -w @vnu/api -- --testPathPattern="zip-roundtrip|blueprint-roundtrip"
